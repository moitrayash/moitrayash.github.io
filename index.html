<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yash Moitra</title>
  <meta name="description" content="Yash Moitra, Cornell University '27." />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; }
    body {
      background: #fff;
      color: #000;
      font-family: Georgia, 'Times New Roman', serif;
      line-height: 1.8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 640px;
      width: 100%;
      padding: 60px 24px;
      text-align: center;
    }
    h1 {
      font-size: 48px;
      font-weight: normal;
      margin-bottom: 28px;
      letter-spacing: 0.01em;
    }
    .body-text {
      font-size: 17px;
      line-height: 1.85;
      margin-bottom: 32px;
    }
    .body-text a {
      color: #000;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .body-text a:hover {
      opacity: 0.55;
    }
    .sig {
      font-style: italic;
      font-size: 17px;
    }
    .divider {
      width: 48px;
      border: none;
      border-top: 1px solid #000;
      margin: 32px auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Yash Moitra</h1>
    <hr class="divider" />
    <p class="body-text">
      I&rsquo;m still playing around with this main domain. In the meantime, you may find my
      Poems, Prose, Acousmatics, and Speeches in my <a href="https://oeuvre.yashmoitra.com">oeuvre</a>.
    </p>
    <p class="sig">Yash</p>
  </div>
</body>
</html>
