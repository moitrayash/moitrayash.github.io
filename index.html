<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yash Moitra</title>
  <meta name="description" content="Yash Moitra — personal website." />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; }
    body {
      background: #fff;
      color: #000;
      font-family: Georgia, 'Times New Roman', serif;
      line-height: 1.8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 640px;
      width: 100%;
      padding: 60px 24px;
    }
    h1 {
      font-size: 42px;
      font-weight: normal;
      margin-bottom: 32px;
      letter-spacing: 0.01em;
    }
    p {
      font-size: 17px;
      line-height: 1.85;
      margin-bottom: 20px;
    }
    p:last-child {
      margin-bottom: 0;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Yash Moitra</h1>
    <p>I&rsquo;m Yash, and this is my personal website. I aim to use this as a digital repository of sorts; my poetry, musings, and other work live here until they should find more permanent homes.</p>
    <p>In a way, this is art for art&rsquo;s sake. You may make as much of it.</p>
    <p>Under Construction</p>
  </div>
</body>
</html>
